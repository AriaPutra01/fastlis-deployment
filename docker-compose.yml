services:
  app:
    image: ghcr.io/ariaputra01/fastlis-backend:latest
    container_name: fastlis-backend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      APP_ENV: production
      PORT: ${PORT:-8080}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      BLUEPRINT_DB_HOST: psql_bp
      BLUEPRINT_DB_PORT: 5432
      BLUEPRINT_DB_DATABASE: ${BLUEPRINT_DB_DATABASE:-fastlis}
      BLUEPRINT_DB_USERNAME: ${BLUEPRINT_DB_USERNAME:-postgres}
      BLUEPRINT_DB_PASSWORD: ${BLUEPRINT_DB_PASSWORD}
      BLUEPRINT_DB_SCHEMA: ${BLUEPRINT_DB_SCHEMA:-public}
      BLUEPRINT_DB_MIGRATION_PATH: ./migrations
      REDIS_HOST: redis_bp
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: 15
      JWT_REFRESH_EXPIRY: 7
      API_KEY: ${API_KEY}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq_bp:5672/
    volumes:
      - app_media:/app/storage/public/media
    depends_on:
      psql_bp:
        condition: service_healthy
      redis_bp:
        condition: service_healthy
      rabbitmq_bp:
        condition: service_healthy
    networks:
      - fastlis_network

  frontend:
    image: ghcr.io/ariaputra01/fastlis-frontend:latest
    container_name: fastlis-frontend
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "5173:80"
    networks:
      - fastlis_network

  sync:
    image: ghcr.io/ariaputra01/fastlis-sync:latest
    container_name: fastlis-sync
    restart: unless-stopped
    ports:
      - "${SYNC_PORT:-8081}:8081"
    environment:
      BRIDGE_MODE: ${BRIDGE_MODE:-API}
      DATABASE_URL: ${SYNC_DATABASE_URL}
      FASTLIS_V2_URL: http://app:${PORT:-8080}
      FASTLIS_V2_API_KEY: ${API_KEY}
      HTTP_SERVER_ADDRESS: :8081
    depends_on:
      app:
        condition: service_started
      psql_bp:
        condition: service_healthy
    networks:
      - fastlis_network

  psql_bp:
    image: postgres:18-alpine
    container_name: fastlis-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${BLUEPRINT_DB_DATABASE:-fastlis}
      POSTGRES_USER: ${BLUEPRINT_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${BLUEPRINT_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - psql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BLUEPRINT_DB_USERNAME:-postgres} -d ${BLUEPRINT_DB_DATABASE:-fastlis}"]
      interval: 5s
      timeout: 5s
      retries: 3
    networks:
      - fastlis_network

  redis_bp:
    image: redis:alpine
    container_name: fastlis-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "${REDIS_PASSWORD}" ping']
      interval: 5s
      timeout: 5s
      retries: 3
    networks:
      - fastlis_network

  rabbitmq_bp:
    image: rabbitmq:4-management-alpine
    container_name: fastlis-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fastlis_network

volumes:
  psql_data:
  redis_data:
  rabbitmq_data:
  app_media:

networks:
  fastlis_network:
