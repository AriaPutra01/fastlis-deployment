services:
  app:
    image: ghcr.io/ariaputra01/fastlis-backend:latest
    container_name: fastlis-backend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      APP_ENV: production
      PORT: ${PORT:-8080}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      BLUEPRINT_DB_HOST: psql_bp
      BLUEPRINT_DB_PORT: 5432
      BLUEPRINT_DB_DATABASE: ${BLUEPRINT_DB_DATABASE:-fastlis}
      BLUEPRINT_DB_USERNAME: ${BLUEPRINT_DB_USERNAME:-postgres}
      BLUEPRINT_DB_PASSWORD: ${BLUEPRINT_DB_PASSWORD}
      BLUEPRINT_DB_SCHEMA: ${BLUEPRINT_DB_SCHEMA:-public}
      BLUEPRINT_DB_MIGRATION_PATH: file://internal/database/migrations
      REDIS_HOST: redis_bp
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: 15
      JWT_REFRESH_EXPIRY: 7
    depends_on:
      psql_bp:
        condition: service_healthy
      redis_bp:
        condition: service_healthy
    networks:
      - fastlis_network

  frontend:
    image: ghcr.io/ariaputra01/fastlis-frontend:latest
    container_name: fastlis-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:${PORT:-8080}/api/v1
    depends_on:
      - app
    ports:
      - "5173:80" # Frontend runs on port 80 inside Nginx container
    networks:
      - fastlis_network

  psql_bp:
    image: postgres:18-alpine
    container_name: fastlis-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${BLUEPRINT_DB_DATABASE:-fastlis}
      POSTGRES_USER: ${BLUEPRINT_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${BLUEPRINT_DB_PASSWORD}
    volumes:
      - psql_data:/var/lib/postgresql/18/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BLUEPRINT_DB_USERNAME:-postgres} -d ${BLUEPRINT_DB_DATABASE:-fastlis}"]
      interval: 5s
      timeout: 5s
      retries: 3
    networks:
      - fastlis_network

  redis_bp:
    image: redis:alpine
    container_name: fastlis-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "${REDIS_PASSWORD}" ping']
      interval: 5s
      timeout: 5s
      retries: 3
    networks:
      - fastlis_network

volumes:
  psql_data:
  redis_data:

networks:
  fastlis_network:
